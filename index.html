<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bing Daily Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-primary: #2c3e50;
            --text-secondary: #7f8c8d;
            --accent-color: #3498db;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
            --modal-bg: rgba(0, 0, 0, 0.85);
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-primary: #ecf0f1;
            --text-secondary: #bdc3c7;
            --accent-color: #5dade2;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            --modal-bg: rgba(0, 0, 0, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            transition: var(--transition);
            line-height: 1.6;
        }

        /* Header */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.5rem 5%; background-color: var(--card-bg);
            box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100;
        }
        h1 { font-size: 1.5rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        h1 i { color: var(--accent-color); }
        .theme-toggle {
            background: none; border: none; cursor: pointer; font-size: 1.2rem;
            color: var(--text-primary); padding: 0.5rem; border-radius: 50%;
            transition: var(--transition);
        }
        .theme-toggle:hover { background-color: rgba(0,0,0,0.05); color: var(--accent-color); }

        /* Gallery Grid */
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        /* Card Style */
        .card {
            background-color: var(--card-bg); border-radius: 12px; overflow: hidden;
            box-shadow: var(--shadow); transition: var(--transition);
            display: flex; flex-direction: column; height: 100%; cursor: pointer;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.15); }

        .img-wrapper {
            position: relative; padding-top: 56.25%; overflow: hidden;
        }
        .img-wrapper img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; transition: transform 0.5s ease;
        }
        .card:hover .img-wrapper img { transform: scale(1.05); }

        .card-content { padding: 1.2rem; flex-grow: 1; display: flex; flex-direction: column; }
        .card-date {
            font-size: 0.85rem; color: var(--accent-color); font-weight: 600;
            margin-bottom: 0.5rem; display: flex; align-items: center; gap: 5px;
        }
        .card-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; line-height: 1.3; }
        .card-desc {
            font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 1rem;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
            overflow: hidden; flex-grow: 1;
        }
        .card-footer {
            margin-top: auto; display: flex; justify-content: space-between;
            align-items: center; font-size: 0.8rem; color: var(--text-secondary);
            border-top: 1px solid rgba(0,0,0,0.05); padding-top: 0.8rem;
        }
        .copyright {
            max-width: 70%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        #loading { text-align: center; padding: 2rem; font-size: 1.2rem; color: var(--text-secondary); }

        /* Modal Styles */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; overflow: auto;
            background-color: var(--modal-bg);
            backdrop-filter: blur(5px);
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal.active { display: block; opacity: 1; }
        
        .modal-content {
            background-color: var(--card-bg);
            margin: 5% auto;
            padding: 0;
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            position: relative;
            height: 300px;
            overflow: hidden;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }
        
        .modal-header img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .modal-body {
            padding: 2rem;
            color: var(--text-primary);
        }

        .modal-date {
            color: var(--accent-color);
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        .modal-title {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .modal-desc {
            font-size: 1rem;
            line-height: 1.8;
            margin-bottom: 2rem;
            color: var(--text-secondary);
        }

        .modal-copyright {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-style: italic;
        }

        /* Quiz Section */
        .quiz-section {
            background-color: rgba(0,0,0,0.03);
            border-radius: 8px;
            padding: 1.5rem;
            border: 1px solid rgba(0,0,0,0.05);
        }
        [data-theme="dark"] .quiz-section {
            background-color: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.1);
        }

        .quiz-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .quiz-title i { color: var(--accent-color); }

        .quiz-question {
            font-size: 1rem;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .quiz-option {
            display: block;
            padding: 10px 15px;
            background-color: var(--card-bg);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 6px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.2s;
        }
        [data-theme="dark"] .quiz-option {
            border-color: rgba(255,255,255,0.1);
        }

        .quiz-option:hover {
            border-color: var(--accent-color);
            background-color: rgba(52, 152, 219, 0.1);
        }

        .quiz-option span {
            font-weight: bold;
            margin-right: 10px;
            color: var(--accent-color);
        }

        @media (max-width: 600px) {
            .gallery { grid-template-columns: 1fr; }
            .modal-header { height: 200px; }
            .modal-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <header>
        <h1><i class="fa-solid fa-image"></i> Bing Daily Gallery</h1>
        <button class="theme-toggle" id="themeToggle" title="切换主题">
            <i class="fa-solid fa-moon"></i>
        </button>
    </header>

    <div class="container">
        <div id="loading">正在加载图库...</div>
        <div class="gallery" id="gallery"></div>
    </div>

    <!-- Detail Modal -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <div class="modal-header">
                <img id="modalImg" src="" alt="Bing Image">
            </div>
            <div class="modal-body">
                <div class="modal-date" id="modalDate"></div>
                <h2 class="modal-title" id="modalTitle"></h2>
                <p class="modal-desc" id="modalDesc"></p>
                <p class="modal-copyright" id="modalCopyright"></p>
                
                <div id="quizContainer" class="quiz-section" style="display: none;">
                    <div class="quiz-title"><i class="fa-solid fa-circle-question"></i> 每日测验</div>
                    <p class="quiz-question" id="quizQuestion"></p>
                    <div class="quiz-options" id="quizOptions"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DATA_URL = './data/images.json';
        const gallery = document.getElementById('gallery');
        const loading = document.getElementById('loading');
        const themeToggle = document.getElementById('themeToggle');
        const modal = document.getElementById('detailModal');
        const closeModal = document.querySelector('.modal-close');

        // Theme Logic
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && systemDark)) {
                document.body.setAttribute('data-theme', 'dark');
                themeToggle.innerHTML = '<i class="fa-solid fa-sun"></i>';
            } else {
                document.body.setAttribute('data-theme', 'light');
                themeToggle.innerHTML = '<i class="fa-solid fa-moon"></i>';
            }
        }

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeToggle.innerHTML = newTheme === 'dark' 
                ? '<i class="fa-solid fa-sun"></i>' 
                : '<i class="fa-solid fa-moon"></i>';
        });

        // Fetch Data
        async function fetchImages() {
            try {
                const response = await fetch(DATA_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                const images = await response.json();
                renderGallery(images);
            } catch (error) {
                console.error('Error fetching images:', error);
                loading.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> 加载失败';
            }
        }

        // Render Gallery
        function renderGallery(images) {
            loading.style.display = 'none';
            if (images.length === 0) {
                gallery.innerHTML = '<p style="text-align:center; width:100%;">暂无图片数据</p>';
                return;
            }
            images.forEach(img => {
                const card = document.createElement('div');
                card.className = 'card';
                // Store full object in dataset for easy access (or just pass ID/Index)
                // For simplicity, we'll attach click event with index
                const index = images.indexOf(img);
                card.onclick = () => openDetailModal(index);

                const description = img.description || '暂无描述';
                const copyright = img.copyright || 'Unknown';
                const imageUrl = img.image_url_1080 || img.image_url;

                card.innerHTML = `
                    <div class="img-wrapper">
                        <img src="${imageUrl}" alt="${img.title}" loading="lazy">
                    </div>
                    <div class="card-content">
                        <div class="card-date"><i class="fa-regular fa-calendar"></i> ${img.date}</div>
                        <h3 class="card-title">${img.title}</h3>
                        <p class="card-desc">${description}</p>
                        <div class="card-footer">
                            <span class="copyright" title="${copyright}"><i class="fa-regular fa-copyright"></i> ${copyright}</span>
                            <i class="fa-solid fa-expand" style="color: var(--accent-color)"></i>
                        </div>
                    </div>
                `;
                gallery.appendChild(card);
            });
            
            // Store images globally for modal access
            window.bingImages = images;
        }

        // Modal Logic
        window.openDetailModal = function(index) {
            const img = window.bingImages[index];
            if (!img) return;

            document.getElementById('modalImg').src = img.image_url_4k || img.image_url;
            document.getElementById('modalDate').innerHTML = `<i class="fa-regular fa-calendar"></i> ${img.date}`;
            document.getElementById('modalTitle').textContent = img.title;
            document.getElementById('modalDesc').textContent = img.description || '暂无描述';
            document.getElementById('modalCopyright').innerHTML = `<i class="fa-regular fa-copyright"></i> ${img.copyright || 'Unknown'}`;

            // Handle Trivia
            const quizContainer = document.getElementById('quizContainer');
            if (img.trivia && img.trivia.question) {
                quizContainer.style.display = 'block';
                document.getElementById('quizQuestion').textContent = img.trivia.question;
                
                const optionsContainer = document.getElementById('quizOptions');
                optionsContainer.innerHTML = ''; // Clear previous
                
                img.trivia.options.forEach(opt => {
                    const link = document.createElement('a');
                    link.href = opt.url;
                    link.target = '_blank';
                    link.className = 'quiz-option';
                    link.innerHTML = `<span>${opt.bullet}.</span> ${opt.text}`;
                    optionsContainer.appendChild(link);
                });
            } else {
                quizContainer.style.display = 'none';
            }

            modal.classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevent background scrolling
        };

        closeModal.addEventListener('click', () => {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        });

        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        // Init
        initTheme();
        fetchImages();
    </script>
</body>
</html>
